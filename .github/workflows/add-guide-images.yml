name: Add guide images

on:
  push:
    paths:
      - '.github/workflows/add-guide-images.yml'

permissions:
  contents: write

jobs:
  add-guide-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add images to Guides IA pages
        run: |
          python - <<'PY'
          from pathlib import Path

          hub = Path('guides-ia/index.html')
          text = hub.read_text(encoding='utf-8')
          if '.guide-img' not in text:
              text = text.replace(
                  '.gold{border-color:rgba(244,199,107,.4);background:rgba(244,199,107,.1)}</style>',
                  '.gold{border-color:rgba(244,199,107,.4);background:rgba(244,199,107,.1)}.guide-img{height:150px;background-size:cover;background-position:center}</style>'
              )
          cards = [
              ('/guide-premier-agent-ia-rentable/', 'https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1000&q=80', 'Atelier de cadrage pour identifier un Agent IA rentable'),
              ('/exemples-agents-ia-metier/', 'https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1000&q=80', 'Exemples d Agents IA metier en entreprise'),
              ('/agent-ia-vs-chatbot-automation/', 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1000&q=80', 'Comparaison entre Agent IA chatbot et automatisation'),
              ('/chatgpt-entreprise-sans-chaos/', 'https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1000&q=80', 'Equipe professionnelle utilisant ChatGPT avec méthode'),
              ('/mesurer-valeur-agent-ia/', 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1000&q=80', 'Mesure de la valeur business d un Agent IA'),
              ('/methode-fikolasai-agent-ia/', 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1000&q=80', 'Méthode de construction d un Agent IA utile'),
          ]
          for href, img, alt in cards:
              start = f'<a href="{href}" class="card p-6 hover:bg-white/10">'
              if start in text:
                  text = text.replace(start, f'<a href="{href}" class="card overflow-hidden hover:bg-white/10 block"><div class="guide-img" role="img" aria-label="{alt}" style="background-image:linear-gradient(180deg,rgba(5,8,22,.05),rgba(5,8,22,.78)),url(\'{img}\')"></div><div class="p-6">', 1)
                  text = text.replace('</p></a>', '</p></div></a>', 1)
          hub.write_text(text, encoding='utf-8')

          hero_images = {
              'guide-premier-agent-ia-rentable/index.html': ('https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1400&q=80', 'Atelier de cadrage pour choisir un premier Agent IA rentable'),
              'exemples-agents-ia-metier/index.html': ('https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1400&q=80', 'Equipe métier travaillant avec des Agents IA utiles'),
              'agent-ia-vs-chatbot-automation/index.html': ('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1400&q=80', 'Interface professionnelle pour comparer Agent IA chatbot et automatisation'),
              'chatgpt-entreprise-sans-chaos/index.html': ('https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1400&q=80', 'Equipe utilisant ChatGPT en entreprise avec une méthode claire'),
              'mesurer-valeur-agent-ia/index.html': ('https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1400&q=80', 'Tableau de bord pour mesurer la valeur d un Agent IA'),
              'methode-fikolasai-agent-ia/index.html': ('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1400&q=80', 'Méthode structurée pour construire un Agent IA métier'),
          }
          for filename, (img, alt) in hero_images.items():
              path = Path(filename)
              page = path.read_text(encoding='utf-8')
              if 'data-guide-visual="true"' not in page:
                  figure = f'</p><figure data-guide-visual="true" class="mb-12 overflow-hidden rounded-3xl border border-line bg-white/5"><img src="{img}" alt="{alt}" class="h-64 md:h-80 w-full object-cover"><figcaption class="px-5 py-4 text-sm text-slate-400" data-fr="Un guide pratique pour passer d’une idée IA à un usage métier clair, utile et mesurable." data-en="A practical guide to move from an AI idea to a clear, useful and measurable business use case.">Un guide pratique pour passer d’une idée IA à un usage métier clair, utile et mesurable.</figcaption></figure><section class="mt-10">'
                  page = page.replace('</p><section class="mt-10">', figure, 1)
              path.write_text(page, encoding='utf-8')
          PY
      - name: Commit guide images
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add guides-ia/index.html guide-premier-agent-ia-rentable/index.html exemples-agents-ia-metier/index.html agent-ia-vs-chatbot-automation/index.html chatgpt-entreprise-sans-chaos/index.html mesurer-valeur-agent-ia/index.html methode-fikolasai-agent-ia/index.html
          git commit -m "Add visuals to AI guide pages"
          git push
