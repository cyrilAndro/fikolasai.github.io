name: Add Phase 3 authority guides

on:
  push:
    paths:
      - '.github/workflows/add-phase3-authority-guides.yml'

permissions:
  contents: write

jobs:
  create-guides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create authority guide pages
        run: |
          python3 <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree as ET

          template = '''<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{title}</title><meta name="description" content="{description}"><link rel="canonical" href="https://fikolasai.com/{slug}/"><meta property="og:title" content="{og_title}"><meta property="og:description" content="{description}"><meta property="og:type" content="article"><meta property="og:url" content="https://fikolasai.com/{slug}/"><meta property="og:image" content="https://fikolasai.com/assets/photo-cyril.png"><meta property="og:site_name" content="FikolasAI"><meta name="twitter:card" content="summary_large_image"><script async src="https://www.googletagmanager.com/gtag/js?id=G-RSN9PNE840"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){{dataLayer.push(arguments)}}gtag('js',new Date());gtag('config','G-RSN9PNE840');</script><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={{theme:{{extend:{{colors:{{ink:'#050816',line:'rgba(255,255,255,.12)',gold:'#f4c76b'}}}}}}}}</script><style>body{{font-family:Inter,ui-sans-serif,system-ui;background:#050816;color:white}}.card{{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:24px}}.gold{{border-color:rgba(244,199,107,.4);background:rgba(244,199,107,.1)}}.lang-active{{background:#f4c76b;color:#07111f}}p{{max-width:72ch}}</style><script type="application/ld+json">{{"@context":"https://schema.org","@type":"Article","headline":"{headline}","description":"{description}","author":{{"@type":"Person","name":"Cyril Cieslak","url":"https://fikolasai.com/qui-est-cyril/"}},"publisher":{{"@type":"Organization","name":"FikolasAI","url":"https://fikolasai.com/"}},"mainEntityOfPage":"https://fikolasai.com/{slug}/"}}</script></head><body><main class="relative overflow-hidden"><div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_0%,rgba(244,199,107,.18),transparent_32%),linear-gradient(180deg,#050816,#0b1120_50%,#050816)]"></div><nav class="border-b border-line bg-ink/88"><div class="max-w-6xl mx-auto px-5 min-h-16 py-3 flex flex-wrap items-center justify-between gap-3"><div class="flex items-center gap-3"><a href="/" class="font-semibold text-xl">FikolasAI</a><a href="/guides-ia/" class="h-10 px-3 inline-flex items-center justify-center rounded-lg border border-line bg-white/5 text-sm font-semibold">← Guides IA</a></div><div class="flex items-center gap-2"><button onclick="setLang('fr')" data-lang="fr" class="lang-btn border border-line px-3 py-2 rounded-lg text-sm">FR</button><button onclick="setLang('en')" data-lang="en" class="lang-btn border border-line px-3 py-2 rounded-lg text-sm">EN</button><a href="https://calendly.com/cyril-fikolasai/rdv-cyril-fikolasai-agent" target="_blank" rel="noreferrer" class="bg-gold text-slate-950 px-4 py-2 rounded-lg font-bold" data-fr="Identifier mon premier levier IA rentable" data-en="Identify my first profitable AI opportunity">Identifier mon premier levier IA rentable</a></div></div></nav><article class="max-w-4xl mx-auto px-5 py-16"><p class="inline-flex rounded-full gold px-4 py-2 text-sm text-amber-100 mb-6" data-fr="Guide FikolasAI" data-en="FikolasAI guide">Guide FikolasAI</p><h1 class="text-4xl md:text-6xl font-semibold leading-tight mb-6" data-fr="{h1_fr}" data-en="{h1_en}">{h1_fr}</h1><p class="text-xl text-slate-300 leading-relaxed mb-10" data-fr="{intro_fr}" data-en="{intro_en}">{intro_fr}</p>{sections}<section class="mt-12 rounded-3xl border border-gold/35 bg-gold/10 p-7"><h2 class="text-2xl md:text-3xl font-semibold mb-4" data-fr="Vous voulez appliquer cela à votre activité ?" data-en="Want to apply this to your business?">Vous voulez appliquer cela à votre activité ?</h2><p class="text-slate-200 mb-6" data-fr="En 15 minutes, on identifie le premier levier IA rentable : formation, usage ChatGPT ou Agent IA métier." data-en="In 15 minutes, we identify the first profitable AI opportunity: training, ChatGPT use case or business AI Agent.">En 15 minutes, on identifie le premier levier IA rentable : formation, usage ChatGPT ou Agent IA métier.</p><div class="flex flex-col sm:flex-row gap-3"><a href="https://calendly.com/cyril-fikolasai/rdv-cyril-fikolasai-agent" target="_blank" rel="noreferrer" class="inline-flex justify-center bg-gold text-slate-950 px-6 py-4 rounded-lg font-bold" data-fr="Identifier mon premier levier IA rentable" data-en="Identify my first profitable AI opportunity">Identifier mon premier levier IA rentable</a><a href="/ressources-ia/" class="inline-flex justify-center border border-line bg-white/5 px-6 py-4 rounded-lg font-semibold" data-fr="Voir toutes les ressources" data-en="See all resources">Voir toutes les ressources</a></div></section></article></main><script>function setLang(lang){{document.documentElement.lang=lang;document.querySelectorAll('[data-fr]').forEach(el=>{{el.textContent=el.dataset[lang]}});document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('lang-active',btn.dataset.lang===lang));localStorage.setItem('fikolasai-lang',lang)}}setLang(localStorage.getItem('fikolasai-lang')||'fr')</script></body></html>'''

          def sec(title_fr, title_en, paragraphs):
              parts = [f'<section class="mt-10"><h2 class="text-3xl font-semibold mb-5" data-fr="{title_fr}" data-en="{title_en}">{title_fr}</h2>']
              for fr, en in paragraphs:
                  parts.append(f'<p class="text-slate-300 leading-relaxed mb-4" data-fr="{fr}" data-en="{en}">{fr}</p>')
              parts.append('</section>')
              return ''.join(parts)

          guides = [
              dict(slug='guide-premier-agent-ia-rentable', title='Comment identifier son premier Agent IA rentable | FikolasAI', og_title='Identifier son premier Agent IA rentable', headline='Comment identifier son premier Agent IA rentable', description='Guide FikolasAI pour choisir une première tâche répétitive à transformer en Agent IA utile, mesurable et rentable.', h1_fr='Comment identifier son premier Agent IA rentable.', h1_en='How to identify your first profitable AI Agent.', intro_fr='Le bon point de départ n’est pas la technologie. C’est une tâche répétitive qui coûte du temps, de l’argent ou de l’énergie chaque semaine.', intro_en='The right starting point is not technology. It is a repetitive task that costs time, money or energy every week.', sections=[sec('1. Partir d’une friction visible','1. Start from visible friction',[('Cherchez une tâche que vous repoussez, répétez souvent ou déléguez mal : relances, qualification, synthèse, classement, préparation de réponses.', 'Look for a task you postpone, repeat often or delegate poorly: follow-ups, qualification, summaries, sorting, reply preparation.'),('Si personne ne ressent la friction, l’Agent IA risque de devenir un gadget.', 'If nobody feels the friction, the AI Agent may become a gadget.')]), sec('2. Choisir un résultat précis','2. Choose a precise output',[('Un bon Agent IA ne “fait pas de l’IA”. Il produit un résultat clair : une fiche, un message, une checklist, une synthèse ou un brouillon à valider.', 'A good AI Agent does not “do AI”. It produces a clear output: a brief, a message, a checklist, a summary or a draft to approve.'),('Plus le livrable est concret, plus l’adoption est simple.', 'The more concrete the deliverable, the easier adoption becomes.')]), sec('3. Mesurer avant de construire','3. Measure before building',[('Avant de construire, estimez le temps perdu, la fréquence de la tâche et l’impact business.', 'Before building, estimate time lost, task frequency and business impact.'),('Le premier Agent IA doit être petit, utile et testable rapidement.', 'The first AI Agent should be small, useful and quickly testable.')])]),
              dict(slug='exemples-agents-ia-metier', title='Exemples d’Agents IA métier | FikolasAI', og_title='Exemples d’Agents IA métier', headline='Exemples d Agents IA métier', description='Exemples concrets d’Agents IA métier pour commerciaux, RH, avocats, dirigeants, consultants et équipes support.', h1_fr='Exemples d’Agents IA métier vraiment utiles.', h1_en='Examples of genuinely useful business AI Agents.', intro_fr='Un Agent IA devient intéressant quand il prépare un vrai travail métier, pas quand il impressionne en démonstration.', intro_en='An AI Agent becomes useful when it prepares real business work, not when it looks impressive in a demo.', sections=[sec('Commercial B2B','B2B sales',[('Un agent peut préparer une fiche prospect, un angle d’approche, un message personnalisé et une relance adaptée.', 'An agent can prepare a prospect brief, an outreach angle, a personalized message and a tailored follow-up.')]), sec('RH et recrutement','HR and recruiting',[('Un agent peut résumer des candidatures, préparer des questions d’entretien et structurer les retours après échange.', 'An agent can summarize applications, prepare interview questions and structure feedback after conversations.')]), sec('Cabinet d’avocat','Law firm',[('Un agent peut qualifier une demande entrante, repérer les pièces manquantes et préparer une réponse à valider.', 'An agent can qualify an inbound request, identify missing documents and prepare a reply for approval.')]), sec('Dirigeant de PME','SMB leader',[('Un agent peut transformer emails, notes et réunions en priorités, actions et points de suivi.', 'An agent can turn emails, notes and meetings into priorities, actions and follow-up points.')])]),
              dict(slug='agent-ia-vs-chatbot-automation', title='Agent IA vs chatbot vs automatisation | Différences simples', og_title='Agent IA vs chatbot vs automatisation', headline='Agent IA vs chatbot vs automatisation', description='Comprendre simplement la différence entre Agent IA, chatbot et automatisation pour choisir la bonne solution business.', h1_fr='Agent IA, chatbot, automatisation : quelle différence ?', h1_en='AI Agent, chatbot, automation: what is the difference?', intro_fr='Ces mots sont souvent mélangés. Pourtant, ils ne répondent pas au même besoin business.', intro_en='These terms are often mixed together. Yet they do not solve the same business need.', sections=[sec('Le chatbot répond','The chatbot replies',[('Un chatbot sert surtout à dialoguer : répondre à des questions, orienter un visiteur ou collecter une première information.', 'A chatbot mainly talks: it answers questions, guides a visitor or collects initial information.')]), sec('L’automatisation déclenche','Automation triggers',[('Une automatisation suit une règle : si un événement arrive, alors une action se produit.', 'Automation follows a rule: if an event happens, then an action occurs.')]), sec('L’Agent IA prépare un travail','The AI Agent prepares work',[('Un Agent IA analyse un contexte, structure des informations et produit un livrable à utiliser ou à valider.', 'An AI Agent analyzes context, structures information and produces a deliverable to use or approve.')]), sec('Le bon choix dépend du résultat','The right choice depends on the result',[('Si vous voulez discuter, pensez chatbot. Si vous voulez déclencher, pensez automatisation. Si vous voulez préparer un travail métier, pensez Agent IA.', 'If you want a conversation, think chatbot. If you want a trigger, think automation. If you want business work prepared, think AI Agent.')])]),
              dict(slug='chatgpt-entreprise-sans-chaos', title='Utiliser ChatGPT en entreprise sans créer de chaos | FikolasAI', og_title='ChatGPT en entreprise sans chaos', headline='Utiliser ChatGPT en entreprise sans créer de chaos', description='Méthode simple pour utiliser ChatGPT en entreprise avec des usages clairs, des règles et une adoption réelle.', h1_fr='Utiliser ChatGPT en entreprise sans créer de chaos.', h1_en='Use ChatGPT in business without creating chaos.', intro_fr='Le risque n’est pas que vos équipes testent ChatGPT. Le risque est que chacun l’utilise différemment, sans cadre, sans méthode et sans résultat mesurable.', intro_en='The risk is not that your teams test ChatGPT. The risk is that everyone uses it differently, without a framework, method or measurable output.', sections=[sec('Commencer par les tâches répétitives','Start with repetitive tasks',[('Emails, synthèses, comptes rendus, reformulations et recherches sont souvent les meilleurs premiers usages.', 'Emails, summaries, reports, rewrites and research are often the best first use cases.')]), sec('Créer des règles simples','Create simple rules',[('Définissez ce qui peut être partagé, ce qui doit rester confidentiel et ce qui doit toujours être validé humainement.', 'Define what can be shared, what must remain confidential and what must always be human-approved.')]), sec('Former sur des cas réels','Train on real cases',[('Une formation utile ne montre pas seulement des prompts. Elle travaille sur les documents, contraintes et livrables de l’entreprise.', 'Useful training does not only show prompts. It works on the company’s documents, constraints and deliverables.')])]),
              dict(slug='mesurer-valeur-agent-ia', title='Comment mesurer la valeur d’un Agent IA | FikolasAI', og_title='Mesurer la valeur d’un Agent IA', headline='Comment mesurer la valeur d un Agent IA', description='Guide pour mesurer la valeur d’un Agent IA : temps gagné, qualité, adoption, réduction de friction et impact business.', h1_fr='Comment mesurer la valeur d’un Agent IA.', h1_en='How to measure the value of an AI Agent.', intro_fr='Un Agent IA n’a de valeur que s’il change quelque chose dans le quotidien : moins de temps perdu, moins d’erreurs, plus de régularité ou un meilleur suivi.', intro_en='An AI Agent has value only if it changes something in daily work: less wasted time, fewer errors, more consistency or better follow-up.', sections=[sec('Mesurer le temps gagné','Measure time saved',[('Comparez le temps nécessaire avant et après : préparation d’une relance, qualification d’un lead, synthèse d’une réunion, suivi d’un dossier.', 'Compare the time required before and after: preparing a follow-up, qualifying a lead, summarizing a meeting, tracking a case.')]), sec('Mesurer la qualité','Measure quality',[('Un bon agent produit des sorties plus claires, plus complètes et plus homogènes.', 'A good agent produces clearer, more complete and more consistent outputs.')]), sec('Mesurer l’adoption','Measure adoption',[('Si personne n’utilise l’agent après deux semaines, le problème n’était peut-être pas assez prioritaire ou le livrable pas assez clair.', 'If nobody uses the agent after two weeks, the problem may not have been important enough or the deliverable clear enough.')])]),
              dict(slug='methode-fikolasai-agent-ia', title='Méthode FikolasAI | Créer un Agent IA utile en 7 jours', og_title='Méthode FikolasAI Agent IA', headline='Méthode FikolasAI pour créer un Agent IA utile', description='La méthode FikolasAI pour créer un Agent IA métier : audit, cadrage, construction, test, adoption et suivi.', h1_fr='La méthode FikolasAI pour créer un Agent IA utile.', h1_en='The FikolasAI method for creating a useful AI Agent.', intro_fr='La méthode est simple : ne pas partir de l’outil, mais d’un problème business précis.', intro_en='The method is simple: do not start from the tool, start from a precise business problem.', sections=[sec('Audit de friction','Friction audit',[('On identifie où le temps, l’argent ou l’énergie fuit réellement.', 'We identify where time, money or energy is actually leaking.')]), sec('Cadrage d’un seul cas','Framing one use case',[('On choisit un premier sujet prioritaire, avec un résultat attendu clair.', 'We choose one priority topic with a clear expected output.')]), sec('Construction et test','Build and test',[('L’agent est construit rapidement, testé sur vos exemples, puis ajusté avec vous.', 'The agent is built quickly, tested on your examples, then adjusted with you.')]), sec('Adoption et suivi','Adoption and support',[('Les 30 jours inclus servent à stabiliser l’usage pour éviter le gadget oublié.', 'The included 30 days are used to stabilize usage and avoid a forgotten gadget.')])])
          ]

          for g in guides:
              sections_html = ''.join(g.pop('sections'))
              slug = g['slug']
              Path(slug).mkdir(exist_ok=True)
              Path(slug, 'index.html').write_text(template.format(sections=sections_html, **g), encoding='utf-8')

          hub_cards = ''.join([f'<a href="/{g["slug"]}/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold">{g["headline"].replace(" d un ", " d’un ")}</p><p class="text-slate-400 mt-3">{g["description"]}</p></a>' for g in guides])
          Path('guides-ia').mkdir(exist_ok=True)
          Path('guides-ia/index.html').write_text(f'''<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Guides IA | FikolasAI</title><meta name="description" content="Guides FikolasAI pour comprendre les Agents IA, ChatGPT en entreprise, la productivité IA et la méthode business."><link rel="canonical" href="https://fikolasai.com/guides-ia/"><meta property="og:title" content="Guides IA | FikolasAI"><meta property="og:description" content="Guides pratiques pour comprendre et utiliser l’IA en entreprise."><meta property="og:type" content="website"><meta property="og:url" content="https://fikolasai.com/guides-ia/"><meta property="og:image" content="https://fikolasai.com/assets/photo-cyril.png"><script async src="https://www.googletagmanager.com/gtag/js?id=G-RSN9PNE840"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){{dataLayer.push(arguments)}}gtag('js',new Date());gtag('config','G-RSN9PNE840');</script><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={{theme:{{extend:{{colors:{{ink:'#050816',line:'rgba(255,255,255,.12)',gold:'#f4c76b'}}}}}}}}</script><style>body{{font-family:Inter,ui-sans-serif,system-ui;background:#050816;color:white}}.card{{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:24px}}.gold{{border-color:rgba(244,199,107,.4);background:rgba(244,199,107,.1)}}</style></head><body><main class="relative overflow-hidden"><div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_0%,rgba(244,199,107,.18),transparent_32%),linear-gradient(180deg,#050816,#0b1120_50%,#050816)]"></div><nav class="border-b border-line bg-ink/88"><div class="max-w-6xl mx-auto px-5 min-h-16 py-3 flex items-center justify-between"><div class="flex items-center gap-3"><a href="/" class="font-semibold text-xl">FikolasAI</a><a href="/ressources-ia/" class="h-10 px-3 inline-flex items-center justify-center rounded-lg border border-line bg-white/5 text-sm font-semibold">← Ressources IA</a></div><a href="https://calendly.com/cyril-fikolasai/rdv-cyril-fikolasai-agent" target="_blank" rel="noreferrer" class="bg-gold text-slate-950 px-4 py-2 rounded-lg font-bold">Identifier mon premier levier IA rentable</a></div></nav><section class="max-w-6xl mx-auto px-5 py-16"><p class="inline-flex rounded-full gold px-4 py-2 text-sm text-amber-100 mb-6">Guides IA</p><h1 class="text-4xl md:text-6xl font-semibold leading-tight mb-6">Guides pour comprendre l’IA utile en entreprise.</h1><p class="text-xl text-slate-300 leading-relaxed max-w-3xl">Des contenus courts, pratiques et citables pour comprendre les Agents IA, ChatGPT, la productivité et la méthode FikolasAI.</p></section><section class="max-w-6xl mx-auto px-5 pb-16 grid md:grid-cols-2 lg:grid-cols-3 gap-4">{hub_cards}</section></main></body></html>''', encoding='utf-8')

          # Update resources hub with a link to guides if not present
          res = Path('ressources-ia/index.html')
          if res.exists():
              txt = res.read_text(encoding='utf-8')
              marker = '<a href="/chatgpt-pour-entreprise/" class="card p-6 hover:bg-white/10">'
              if '/guides-ia/' not in txt and marker in txt:
                  insert = '<a href="/guides-ia/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold" data-fr="Guides IA" data-en="AI guides">Guides IA</p><p class="text-slate-400 mt-3" data-fr="Méthodes, comparatifs et contenus d’autorité pour mieux décider." data-en="Methods, comparisons and authority content to make better decisions.">Méthodes, comparatifs et contenus d’autorité pour mieux décider.</p></a>'
                  txt = txt.replace(marker, insert + marker, 1)
                  res.write_text(txt, encoding='utf-8')

          sitemap = Path('sitemap.xml')
          content = sitemap.read_text(encoding='utf-8')
          urls = ['guides-ia'] + [g['slug'] for g in guides]
          add = ''
          for slug in urls:
              loc = f'https://fikolasai.com/{slug}/'
              if loc not in content:
                  add += f'  <url>\n    <loc>{loc}</loc>\n    <lastmod>2026-05-26</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.72</priority>\n  </url>\n'
          if add:
              content = content.replace('</urlset>', add + '</urlset>')
              sitemap.write_text(content, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add Phase 3 authority guides" || exit 0
          git push
