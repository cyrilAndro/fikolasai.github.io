name: Fix guides copy

on:
  push:
    paths:
      - '.github/workflows/fix-guides-copy.yml'

permissions:
  contents: write

jobs:
  fix-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix copy
        run: |
          python3 <<'PY'
          from pathlib import Path
          for path in [Path('guides-ia/index.html')]:
              text = path.read_text(encoding='utf-8')
              text = text.replace('Exemples d Agents IA métier', 'Exemples d’Agents IA métier')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guides-ia/index.html
          git commit -m "Fix guides hub copy" || exit 0
          git push
