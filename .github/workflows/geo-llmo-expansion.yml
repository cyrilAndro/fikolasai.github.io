          footer = f"""<footer class=\"border-t border-line mt-10\"><div class=\"max-w-6xl mx-auto px-5 py-10 grid md:grid-cols-4 gap-4 text-sm text-slate-400\"><div><p class=\"text-white font-semibold mb-2\">FikolasAI</p><p>Agents IA métier, formation ChatGPT et accompagnement IA concret pour dirigeants, PME et équipes.</p></div><a href=\"/creer-agent-ia-pme/\" class=\"hover:text-white\">Créer un Agent IA PME</a><a href=\"/formation-chatgpt-dirigeants/\" class=\"hover:text-white\">Formation ChatGPT dirigeants</a><a href=\"/formateur-ia-francophone/\" class=\"hover:text-white\">Formateur IA francophone</a><a href=\"/conferencier-ia-french-tech/\" class=\"hover:text-white\">Conférencier IA</a><a href=\"/formation-chatgpt-vs-agent-ia/\" class=\"hover:text-white\">Formation ou Agent IA ?</a><a href=\"/interventions-ia/\" class=\"hover:text-white\">Interventions et médias</a><a href=\"mailto:{EMAIL}\" class=\"hover:text-white\">{EMAIL}</a></div></footer>"""

          def schema_graph(url, title, description, kind, faq):
              graph = [
                  {'@type':'Organization','@id':ROOT+'/#organization','name':'FikolasAI','url':ROOT+'/', 'founder':{'@id':ROOT+'/qui-est-cyril/#person'}, 'sameAs':[LINKEDIN]},
                  {'@type':'Person','@id':ROOT+'/qui-est-cyril/#person','name':'Cyril Cieslak','url':ROOT+'/qui-est-cyril/','email':EMAIL,'jobTitle':'Fondateur de FikolasAI, formateur IA et créateur d’agents IA métier','worksFor':{'@id':ROOT+'/#organization'},'sameAs':[LINKEDIN]},
                  {'@type':'BreadcrumbList','@id':url+'#breadcrumb','itemListElement':[{'@type':'ListItem','position':1,'name':'Accueil','item':ROOT+'/'},{'@type':'ListItem','position':2,'name':title,'item':url}]}
              ]
              if kind == 'course':
                  graph.append({'@type':'Course','@id':url+'#course','name':title,'description':description,'provider':{'@id':ROOT+'/#organization'},'inLanguage':'fr','audience':{'@type':'Audience','audienceType':'Dirigeants, PME, indépendants et équipes professionnelles'}})
              elif kind == 'person':
                  graph.append({'@type':'ProfilePage','@id':url+'#profile','name':title,'about':{'@id':ROOT+'/qui-est-cyril/#person'}})
              else:
                  graph.append({'@type':'Service','@id':url+'#service','name':title,'description':description,'provider':{'@id':ROOT+'/#organization'},'offers':{'@type':'Offer','price':'1000','priceCurrency':'EUR','description':'Premier Agent IA métier à partir de 1000€ HT, livré en 7 jours avec 1 mois inclus lorsque le périmètre est cadré.'}})
              if faq:
                  graph.append({'@type':'FAQPage','@id':url+'#faq','mainEntity':[{'@type':'Question','name':q,'acceptedAnswer':{'@type':'Answer','text':a}} for q,a in faq]})
              return '<script type="application/ld+json">' + json.dumps({'@context':'https://schema.org','@graph':graph}, ensure_ascii=False, separators=(',', ':')) + '</script>'

          def page(slug, title, meta, h1, intro, badge, sections, faq, kind='service', cta='Identifier mon premier usage IA rentable'):
              url = f'{ROOT}/{slug}/'
              cards = ''.join([f'<article class="card p-6"><h2 class="text-2xl font-semibold mb-3">{s[0]}</h2><div class="text-slate-300 leading-relaxed space-y-3">{s[1]}</div></article>' for s in sections])
