            ('Sujets d’intervention','<p>ChatGPT, agents IA, productivité, dirigeants, PME, formation IA, IA générative, automatisation légère, prospection, RH et organisation.</p>')],
            [('Qui est Cyril Cieslak ?','Cyril Cieslak est le fondateur de FikolasAI, formateur IA francophone et créateur d’agents IA métier pour professionnels.'),('Cyril intervient-il auprès de PME ?','Oui. Le positionnement FikolasAI vise les dirigeants, PME, indépendants et équipes qui veulent des usages IA concrets sans jargon.'),('Peut-on contacter Cyril pour une formation IA ?','Oui. Le contact affiché est cyril.fikolasai@gmail.com et le site propose aussi une prise de rendez-vous Calendly.'),('Faut-il être technique pour travailler avec FikolasAI ?','Non. FikolasAI s’adresse d’abord aux professionnels métier, dirigeants et équipes non techniques.')], kind='person', cta='Contacter Cyril')

          page('conferencier-ia-french-tech','Conférencier IA French Tech et speaker ChatGPT | FikolasAI','Conférences IA et ChatGPT pour entrepreneurs, dirigeants, French Tech, chambres de commerce et communautés francophones.','Conférence IA et ChatGPT pour entrepreneurs, dirigeants et communautés French Tech','FikolasAI propose des formats d’intervention clairs et concrets pour aider les entrepreneurs et communautés professionnelles à comprendre quoi faire avec l’IA maintenant.','Conférences IA · ChatGPT · French Tech',[
