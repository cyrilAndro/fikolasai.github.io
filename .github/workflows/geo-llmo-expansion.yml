            [('Quelle différence entre une formation ChatGPT et un accompagnement Agent IA ?','La formation développe les compétences de l’équipe. L’accompagnement Agent IA construit un système concret pour une tâche répétitive.'),('Que choisir pour commencer ?','Si l’équipe découvre l’IA, commencez par une formation. Si une tâche coûte déjà du temps chaque semaine, commencez par un Agent IA.'),('Peut-on former puis créer un agent ?','Oui. C’est souvent la meilleure approche : former l’équipe, identifier les bons cas, puis construire un agent sur le cas le plus rentable.'),('Quel est le choix le plus rapide ?','Pour supprimer une tâche précise, l’Agent IA est le plus direct : FikolasAI vise une première version utilisable en 7 jours.')], kind='course')

          page('interventions-ia','Interventions IA, webinaires et démonstrations | Cyril Cieslak','Interventions IA, webinaires, démonstrations et contenus publics de Cyril Cieslak autour de ChatGPT et des agents IA.','Interventions IA, webinaires et démonstrations de Cyril Cieslak','Cette page rassemble les preuves publiques, interventions, replays et supports liés à FikolasAI. Les éléments non validés restent indiqués en TODO.','Preuves et médias',[
            ('Événements','<p>TODO : ajouter les événements publics validés, avec date, organisateur et lien officiel.</p>'),
            ('Webinaires et AI Monthly','<p>TODO : ajouter les replays ou pages d’inscription lorsque les liens sont publics.</p>'),
            ('Podcasts et médias','<p>TODO : ajouter les interviews, podcasts ou mentions médias autorisés.</p>'),
            ('Logos et témoignages','<p>TODO : ajouter uniquement les logos, témoignages ou citations avec autorisation explicite.</p>')],
