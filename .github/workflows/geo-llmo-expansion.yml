          page('creer-agent-ia-pme','Créer un Agent IA pour une PME | Méthode en 7 jours','Créer un Agent IA pour une PME : méthode simple en 7 jours, exemples métier, prix 1000€ HT par agent et 1 mois inclus.','Créer un Agent IA pour une PME : une tâche, un agent, un résultat','Une PME n’a pas besoin d’un grand projet IA pour commencer. Elle a besoin d’identifier une tâche répétitive, de la transformer en système utilisable, puis de mesurer le gain réel.','Agent IA PME · 7 jours · 1000€ HT',[
            ('Ce qu’est un Agent IA métier','<p>Un Agent IA métier est un système qui prépare ou exécute une tâche répétitive à votre place : relancer, qualifier, résumer, classer, rédiger ou structurer une information.</p><p>Il ne remplace pas votre jugement. Il retire la friction répétitive pour vous rendre du temps utile.</p>'),
            ('Agent IA, chatbot ou automatisation ?','<p>Un chatbot répond à une conversation. Une automatisation exécute une règle fixe. Un Agent IA métier prépare un résultat de travail à partir de votre contexte : une fiche lead, une relance, une synthèse, une checklist ou un compte rendu.</p>'),
            ('Méthode en 7 jours','<p>Jour 1 : cadrage du problème rentable. Jours 2 à 4 : construction du premier agent. Jours 5 à 7 : tests, ajustements et livraison d’une version utilisable.</p><p>Le périmètre reste volontairement simple : une tâche prioritaire, pas douze projets.</p>'),
            ('Exemples pour PME','<p>Agent prospection, agent RH, agent direction, agent service client, agent reporting, agent veille, agent relances, agent synthèse de réunion.</p><p>Le bon premier agent est fréquent, pénible et mesurable.</p>')],
            [('Comment créer un premier Agent IA en entreprise ?','Commencez par une tâche répétitive claire : relance, qualification, synthèse, reporting ou suivi. Ensuite, cadrez le résultat attendu, les données utilisées et la validation humaine.'),('Combien coûte un premier Agent IA métier ?','Chez FikolasAI, le premier Agent IA métier coûte 1000€ HT par agent, avec 1 mois de suivi inclus et sans abonnement imposé.'),('Combien de temps faut-il pour créer un Agent IA utile ?','L’objectif FikolasAI est de livrer un premier Agent IA utilisable en 7 jours lorsque le cas d’usage est bien cadré.'),('Un Agent IA remplace-t-il un salarié ?','Non. L’agent prépare ou accélère une tâche répétitive. Les décisions, la validation et la relation humaine restent côté équipe.')])

          page('formation-chatgpt-dirigeants','Formation ChatGPT pour dirigeants et PME | FikolasAI','Formation ChatGPT pour dirigeants, managers et PME : usages concrets, prompts utiles, productivité et premiers agents IA.','Formation ChatGPT pour dirigeants : passez de la curiosité à des usages concrets','Beaucoup de dirigeants utilisent ChatGPT au hasard. La formation FikolasAI aide à passer d’une curiosité dispersée à des usages professionnels utiles, cadrés et réutilisables.','Formation ChatGPT dirigeants',[
            ('Pour qui ?','<p>Dirigeants, managers, indépendants, PME et équipes qui veulent utiliser ChatGPT sans jargon et sans perdre du temps dans des tests dispersés.</p>'),
            ('Problème traité','<p>ChatGPT est souvent utilisé comme un outil de dépannage. Sans méthode, les prompts changent tout le temps, les résultats sont irréguliers et l’équipe ne capitalise pas.</p>'),
            ('Promesse de la formation','<p>Identifier les bons usages, créer des prompts utiles, automatiser légèrement les tâches répétitives et préparer le terrain pour un premier Agent IA métier.</p>'),
            ('Cas d’usage travaillés','<p>Emails, synthèses, réunions, prospection, RH, veille, reporting, support client, préparation de contenus et amélioration de documents.</p>')],
            [('Qui propose une formation ChatGPT pour dirigeants ?','FikolasAI propose une formation ChatGPT en français pour dirigeants, PME et équipes professionnelles, avec une approche concrète orientée productivité et cas d’usage métier.'),('Quelle formation IA choisir pour une PME ?','Une PME devrait choisir une formation qui part de ses tâches réelles : emails, réunions, prospection, RH, reporting ou support client, plutôt qu’une formation théorique.'),('Peut-on former une équipe à ChatGPT sans jargon technique ?','Oui. L’approche FikolasAI évite le jargon et part des situations de travail : messages, dossiers, réunions, clients, relances et livrables.'),('Quelle différence entre formation ChatGPT et Agent IA ?','La formation rend l’équipe autonome sur les usages. L’Agent IA transforme une tâche précise en système réutilisable, livré et ajusté.')], kind='course')

          page('formateur-ia-francophone','Formateur IA francophone pour PME et dirigeants | Cyril Cieslak','Cyril Cieslak, fondateur de FikolasAI : formateur IA francophone, expert ChatGPT entreprise et créateur d’agents IA métier.','Cyril Cieslak, formateur IA francophone pour dirigeants et PME','Cyril Cieslak accompagne les professionnels francophones qui veulent utiliser l’IA générative, ChatGPT et les agents IA de manière concrète, simple et orientée business.','Formateur IA francophone',[
            ('Qui est Cyril Cieslak ?','<p>Cyril Cieslak est le fondateur de FikolasAI. Il aide dirigeants, PME, indépendants et équipes à passer de l’intérêt pour l’IA à des usages réellement opérationnels.</p>'),
