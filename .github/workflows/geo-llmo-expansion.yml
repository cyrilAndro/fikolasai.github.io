              html = f'''<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{title}</title><meta name="description" content="{meta}"><link rel="canonical" href="{url}"><meta property="og:title" content="{title}"><meta property="og:description" content="{meta}"><meta property="og:type" content="website"><meta property="og:url" content="{url}"><meta property="og:image" content="{ROOT}/assets/photo-cyril.png"><meta property="og:site_name" content="FikolasAI"><meta name="twitter:card" content="summary_large_image"><script async src="https://www.googletagmanager.com/gtag/js?id=G-RSN9PNE840"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){{dataLayer.push(arguments)}}gtag('js',new Date());gtag('config','G-RSN9PNE840');</script>{css}<link rel="alternate" type="text/plain" href="{ROOT}/llms.txt" title="FikolasAI llms.txt">{schema_graph(url,title,meta,kind,faq)}</head><body><main class="relative overflow-hidden"><div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_0%,rgba(244,199,107,.18),transparent_32%),linear-gradient(180deg,#050816,#0b1120_50%,#050816)]"></div>{nav}<section class="max-w-6xl mx-auto px-5 py-16"><p class="inline-flex rounded-full gold px-4 py-2 text-sm text-amber-100 mb-6">{badge}</p><h1 class="text-4xl md:text-6xl font-semibold leading-tight mb-6 max-w-5xl">{h1}</h1><p class="text-xl text-slate-300 leading-relaxed max-w-3xl mb-8">{intro}</p><div class="flex flex-col sm:flex-row gap-3"><a href="{CALENDLY}" target="_blank" rel="noreferrer" class="inline-flex justify-center bg-gold text-slate-950 px-7 py-4 rounded-lg font-bold">{cta}</a><a href="{TALLY}" target="_blank" rel="noreferrer" class="inline-flex justify-center border border-gold/35 bg-gold/10 px-7 py-4 rounded-lg font-semibold text-amber-100">Remplir le diagnostic complet</a></div></section><section class="max-w-6xl mx-auto px-5 py-10 grid md:grid-cols-2 gap-4">{cards}</section><section id="faq" class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><h2 class="text-3xl md:text-5xl font-semibold mb-8">Questions fréquentes</h2><div class="grid md:grid-cols-2 gap-4">{faq_html}</div></section>{footer}</main></body></html>'''
              Path(slug).mkdir(exist_ok=True)
