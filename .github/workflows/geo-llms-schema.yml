name: GEO llms and schema

on:
  push:
    paths:
      - '.github/workflows/geo-llms-schema.yml'

permissions:
  contents: write

jobs:
  geo-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add llms links and structured data
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          llms_link = '<link rel="alternate" type="text/plain" href="https://fikolasai.com/llms.txt" title="FikolasAI llms.txt">'

          html_files = [p for p in Path('.').rglob('index.html') if '.git' not in p.parts]
          for path in html_files:
              text = path.read_text(encoding='utf-8')
              changed = False
              if llms_link not in text and '</head>' in text:
                  text = text.replace('</head>', f'{llms_link}</head>', 1)
                  changed = True
              path.write_text(text, encoding='utf-8') if changed else None

          home = Path('index.html')
          text = home.read_text(encoding='utf-8')
          if 'FikolasAI Agent - premier Agent IA métier' not in text:
              graph = {
                  '@context': 'https://schema.org',
                  '@graph': [
                      {
                          '@type': 'Organization',
                          '@id': 'https://fikolasai.com/#organization',
                          'name': 'FikolasAI',
                          'url': 'https://fikolasai.com/',
                          'logo': 'https://fikolasai.com/assets/photo-cyril.png',
                          'founder': {'@id': 'https://fikolasai.com/qui-est-cyril/#person'},
                          'sameAs': ['https://www.linkedin.com/in/cyrilfikolasaiacademy/']
                      },
                      {
                          '@type': 'Person',
                          '@id': 'https://fikolasai.com/qui-est-cyril/#person',
                          'name': 'Cyril Cieslak',
                          'url': 'https://fikolasai.com/qui-est-cyril/',
                          'email': 'cyril.fikolasai@gmail.com',
                          'jobTitle': 'Fondateur de FikolasAI',
                          'worksFor': {'@id': 'https://fikolasai.com/#organization'}
                      },
                      {
                          '@type': 'Service',
                          '@id': 'https://fikolasai.com/#fikolasai-agent',
                          'name': 'FikolasAI Agent - premier Agent IA métier',
                          'serviceType': 'Création d’Agent IA métier',
                          'provider': {'@id': 'https://fikolasai.com/#organization'},
                          'areaServed': ['France', 'United States'],
                          'description': 'Création d’un premier Agent IA métier prêt à l’emploi en 7 jours pour transformer une tâche répétitive en système utilisable.',
                          'offers': {
                              '@type': 'Offer',
                              'price': '1000',
                              'priceCurrency': 'EUR',
                              'availability': 'https://schema.org/InStock',
                              'description': '1000€ HT par Agent IA, livraison en 7 jours, 1 mois de suivi inclus, sans abonnement imposé.'
                          }
                      },
                      {
                          '@type': 'WebSite',
                          '@id': 'https://fikolasai.com/#website',
                          'name': 'FikolasAI',
                          'url': 'https://fikolasai.com/',
                          'publisher': {'@id': 'https://fikolasai.com/#organization'},
                          'inLanguage': ['fr', 'en']
                      }
                  ]
              }
              script = '<script type="application/ld+json">' + json.dumps(graph, ensure_ascii=False, separators=(',', ':')) + '</script>'
              text = text.replace('</head>', script + '</head>', 1)
              home.write_text(text, encoding='utf-8')

          # Add llms.txt discovery in robots.txt without changing crawl rules.
          robots = Path('robots.txt')
          if robots.exists():
              r = robots.read_text(encoding='utf-8')
              if 'https://fikolasai.com/llms.txt' not in r:
                  r = r.rstrip() + '\n\n# AI discovery\n# llms.txt: https://fikolasai.com/llms.txt\n'
                  robots.write_text(r, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Improve GEO structured data and llms discovery"
          git push
