name: GEO phase links

on:
  push:
    paths:
      - '.github/workflows/geo-phase-2-links.yml'

permissions:
  contents: write

jobs:
  geo-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link GEO authority pages
        run: |
          python - <<'PY'
          from pathlib import Path

          urls = [
              ('https://fikolasai.com/definition-agent-ia-metier/', '0.74'),
              ('https://fikolasai.com/faq-agent-ia/', '0.74'),
              ('https://fikolasai.com/glossaire-ia-business/', '0.70'),
          ]
          sitemap = Path('sitemap.xml')
          if sitemap.exists():
              text = sitemap.read_text(encoding='utf-8')
              insert = ''
              for loc, priority in urls:
                  if loc not in text:
                      insert += f'''  <url>\n    <loc>{loc}</loc>\n    <lastmod>2026-05-26</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>{priority}</priority>\n  </url>\n'''
              if insert:
                  text = text.replace('</urlset>', insert + '</urlset>')
                  sitemap.write_text(text, encoding='utf-8')

          guides = Path('guides-ia/index.html')
          if guides.exists():
              text = guides.read_text(encoding='utf-8')
              if '/definition-agent-ia-metier/' not in text:
                  cards = '''<section class="max-w-6xl mx-auto px-5 pb-16 border-t border-line pt-12"><h2 class="text-3xl md:text-4xl font-semibold mb-6">Pages de référence IA</h2><div class="grid md:grid-cols-3 gap-4"><a href="/definition-agent-ia-metier/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold">Qu’est-ce qu’un Agent IA métier ?</p><p class="text-slate-400 mt-3">Définition claire, exemples, différence avec chatbot et automatisation.</p></a><a href="/faq-agent-ia/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold">FAQ Agent IA</p><p class="text-slate-400 mt-3">Prix, délai, 1 mois inclus, abonnement, usage et méthode FikolasAI.</p></a><a href="/glossaire-ia-business/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold">Glossaire IA business</p><p class="text-slate-400 mt-3">Définitions simples pour comprendre l’IA utile en entreprise.</p></a></div></section>'''
                  text = text.replace('</main></body></html>', cards + '</main></body></html>')
                  guides.write_text(text, encoding='utf-8')

          resources = Path('ressources-ia/index.html')
          if resources.exists():
              text = resources.read_text(encoding='utf-8')
              if '/definition-agent-ia-metier/' not in text:
                  block = '''<section class="max-w-6xl mx-auto px-5 py-16 border-t border-line"><h2 class="text-3xl md:text-4xl font-semibold mb-6" data-fr="Pages de référence" data-en="Reference pages">Pages de référence</h2><div class="grid md:grid-cols-3 gap-4"><a href="/definition-agent-ia-metier/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold">Définition Agent IA métier</p><p class="text-slate-400 mt-3">La définition courte et citable d’un Agent IA utile en entreprise.</p></a><a href="/faq-agent-ia/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold">FAQ Agent IA</p><p class="text-slate-400 mt-3">Les réponses aux questions fréquentes sur l’offre, le délai et le suivi.</p></a><a href="/glossaire-ia-business/" class="card p-6 hover:bg-white/10"><p class="text-gold font-semibold">Glossaire IA business</p><p class="text-slate-400 mt-3">Les mots importants expliqués simplement.</p></a></div></section>'''
                  text = text.replace('<section class="max-w-4xl mx-auto px-5 py-16 text-center border-t border-line">', block + '<section class="max-w-4xl mx-auto px-5 py-16 text-center border-t border-line">')
                  resources.write_text(text, encoding='utf-8')
          PY
      - name: Commit GEO links
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml guides-ia/index.html ressources-ia/index.html
          git commit -m "Link GEO authority pages"
          git push
