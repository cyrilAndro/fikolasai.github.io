name: One-shot conversion and SEO update

on:
  push:
    paths:
      - '.github/workflows/one-shot-conversion-seo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-conversion-seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Optimize existing vertical pages
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          calendly = 'https://calendly.com/cyrilfikolasai/diagnostic-express-ia-15-min'
          tally = 'https://tally.so/r/2EbyZL'
          cta_fr = 'Identifier mon premier Agent IA rentable'
          cta_en = 'Identify my first profitable AI Agent'
          tally_fr = 'Remplir le diagnostic complet'
          tally_en = 'Complete the full diagnostic'

          pages = {
              'immigration-lawyers-usa/index.html': {
                  'title': 'Agent IA avocat immigration USA | Qualifier les leads visa en 7 jours',
                  'description': 'Avocats francophones en immigration aux Etats-Unis : identifiez votre premier Agent IA rentable en 7 jours pour qualifier les demandes visa, structurer les dossiers et gagner du temps. 1000 EUR HT, 1 mois inclus.',
                  'schema': 'Agent IA pour avocats immigration USA',
                  'why': ('Une approche pensée pour les cabinets qui veulent gagner du temps sans perdre le contrôle juridique.', 'An approach designed for firms that want to save time without losing legal control.'),
                  'objection': ('Votre jugement reste central : l’agent prépare, structure et accélère. Vous validez toujours.', 'Your judgment stays central: the agent prepares, structures and accelerates. You always approve.'),
              },
              'sales-b2b-agent-ia/index.html': {
                  'title': 'Agent IA commercial B2B | Relances, qualification et prospection',
                  'description': 'Equipes commerciales B2B : identifiez votre premier Agent IA rentable en 7 jours pour preparer les relances, qualifier les leads et structurer la prospection. 1000 EUR HT, 1 mois inclus.',
                  'schema': 'Agent IA commercial B2B',
                  'why': ('Une approche business : moins de copier-coller, plus de relances propres, plus de temps commercial utile.', 'A business-first approach: less copy-paste, cleaner follow-ups, more useful selling time.'),
                  'objection': ('L’agent ne remplace pas le commercial : il prépare le travail pour que l’équipe vende mieux.', 'The agent does not replace the salesperson: it prepares the work so the team can sell better.'),
              },
              'agent-ia-rh/index.html': {
                  'title': 'Agent IA RH et recrutement | Trier, synthétiser, répondre en 7 jours',
                  'description': 'RH, DRH et recrutement : identifiez votre premier Agent IA rentable en 7 jours pour synthetiser les candidatures, preparer les entretiens et reduire les taches repetitives. 1000 EUR HT, 1 mois inclus.',
                  'schema': 'Agent IA RH et recrutement',
                  'why': ('Une mise en place prudente, centrée sur l’aide à la décision et la qualité du suivi candidat.', 'A careful setup focused on decision support and candidate follow-up quality.'),
                  'objection': ('L’humain décide. L’agent aide à préparer, comparer, synthétiser et répondre plus vite.', 'Humans decide. The agent helps prepare, compare, summarize and reply faster.'),
              },
              'agent-ia-cabinet-conseil/index.html': {
                  'title': 'Agent IA cabinet de conseil | Audits, comptes rendus, livrables',
                  'description': 'Cabinets de conseil : identifiez votre premier Agent IA rentable en 7 jours pour preparer les audits, comptes rendus, propositions et livrables clients. 1000 EUR HT, 1 mois inclus.',
                  'schema': 'Agent IA pour cabinet de conseil',
                  'why': ('Une logique d’opérateur : transformer vos notes et échanges en livrables plus propres, plus vite.', 'An operator mindset: turn your notes and conversations into cleaner deliverables, faster.'),
                  'objection': ('L’agent respecte votre méthode : il prépare selon votre structure, votre ton et vos exemples.', 'The agent follows your method: it prepares work using your structure, tone and examples.'),
              },
              'agent-ia-dirigeant-pme/index.html': {
                  'title': 'Agent IA dirigeant PME | Organisation, suivi et gain de temps',
                  'description': 'Dirigeants de PME : identifiez votre premier Agent IA rentable en 7 jours pour reduire la charge mentale, structurer le suivi et gagner du temps. 1000 EUR HT, 1 mois inclus.',
                  'schema': 'Agent IA pour dirigeant de PME',
                  'why': ('Une approche simple pour retirer une friction opérationnelle sans lancer un grand chantier technique.', 'A simple approach to remove one operational friction without starting a large technical project.'),
                  'objection': ('On part d’une tâche concrète, pas d’une transformation abstraite. Le résultat doit être utilisable.', 'We start from one concrete task, not an abstract transformation. The result must be usable.'),
              },
              'agent-ia-chambre-commerce/index.html': {
                  'title': 'Agent IA chambre de commerce | Membres, événements, mises en relation',
                  'description': 'Chambres de commerce françaises a l etranger : identifiez votre premier Agent IA rentable en 7 jours pour traiter les demandes membres, preparer les mises en relation et structurer les evenements. 1000 EUR HT, 1 mois inclus.',
                  'schema': 'Agent IA pour chambre de commerce',
                  'why': ('Une approche adaptée aux structures institutionnelles : claire, prudente, orientée service membre.', 'An approach adapted to institutional organizations: clear, careful and member-service oriented.'),
                  'objection': ('L’agent aide à prioriser, préparer et structurer. Il ne remplace pas la relation humaine.', 'The agent helps prioritize, prepare and structure. It does not replace human relationships.'),
              },
          }

          micro_proof = '''<div class="mt-7 grid sm:grid-cols-3 gap-3 text-sm"><div class="rounded-2xl border border-line bg-white/[0.04] p-4"><strong class="block text-gold" data-fr="+72 entreprises" data-en="+72 companies">+72 entreprises</strong><span class="text-slate-400" data-fr="identifiées" data-en="identified">identifiées</span></div><div class="rounded-2xl border border-line bg-white/[0.04] p-4"><strong class="block text-gold" data-fr="+215 décideurs" data-en="+215 decision-makers">+215 décideurs</strong><span class="text-slate-400" data-fr="qualifiés ajoutés" data-en="qualified and added">qualifiés ajoutés</span></div><div class="rounded-2xl border border-line bg-white/[0.04] p-4"><strong class="block text-gold" data-fr="France + États-Unis" data-en="France + United States">France + États-Unis</strong><span class="text-slate-400" data-fr="agents IA déployés" data-en="AI Agents deployed">agents IA déployés</span></div></div>'''

          def why_block(why_fr, why_en, objection_fr, objection_en):
              return f'''<section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><div class="grid lg:grid-cols-[.85fr_1.15fr] gap-6 items-start"><div><p class="text-gold font-semibold mb-3" data-fr="Pourquoi Cyril ?" data-en="Why Cyril?">Pourquoi Cyril ?</p><h2 class="text-3xl md:text-4xl font-semibold leading-tight" data-fr="Vous ne déléguez pas à une plateforme. Vous travaillez avec un opérateur." data-en="You are not delegating to a platform. You work with an operator.">Vous ne déléguez pas à une plateforme. Vous travaillez avec un opérateur.</h2></div><div class="grid md:grid-cols-3 gap-3"><article class="card p-5"><h3 class="font-semibold mb-2" data-fr="Cadrage business" data-en="Business framing">Cadrage business</h3><p class="text-sm text-slate-400" data-fr="On choisit une tâche rentable, pas un gadget IA." data-en="We choose a profitable task, not an AI gadget.">On choisit une tâche rentable, pas un gadget IA.</p></article><article class="card p-5"><h3 class="font-semibold mb-2" data-fr="Exécution rapide" data-en="Fast execution">Exécution rapide</h3><p class="text-sm text-slate-400" data-fr="Une première version utilisable en 7 jours, puis ajustée avec vous." data-en="A usable first version in 7 days, then adjusted with you.">Une première version utilisable en 7 jours, puis ajustée avec vous.</p></article><article class="card p-5"><h3 class="font-semibold mb-2" data-fr="Adoption réelle" data-en="Real adoption">Adoption réelle</h3><p class="text-sm text-slate-400" data-fr="L’agent doit entrer dans votre quotidien, sinon il ne vaut rien." data-en="The agent must fit into your daily work, otherwise it has no value.">L’agent doit entrer dans votre quotidien, sinon il ne vaut rien.</p></article></div><div class="lg:col-start-2 rounded-2xl border border-gold/35 bg-gold/10 p-5"><p class="text-slate-200" data-fr="{why_fr}" data-en="{why_en}">{why_fr}</p><p class="mt-3 text-sm text-slate-400" data-fr="{objection_fr}" data-en="{objection_en}">{objection_fr}</p><a href="/qui-est-cyril/" class="mt-5 inline-flex rounded-lg border border-line bg-white/5 px-4 py-3 text-sm font-semibold hover:bg-white/10 transition"><span data-fr="Comprendre la méthode de Cyril" data-en="Understand Cyril’s method">Comprendre la méthode de Cyril</span></a></div></div></section>'''

          for page, data in pages.items():
              path = Path(page)
              text = path.read_text(encoding='utf-8')

              text = re.sub(r'<title>.*?</title>', f'<title>{data["title"]}</title>', text, count=1, flags=re.S)
              text = re.sub(r'<meta name="description" content=".*?">', f'<meta name="description" content="{data["description"]}">', text, count=1, flags=re.S)
              text = re.sub(r'"name":"[^"]+"', f'"name":"{data["schema"]}"', text, count=1)

              # Primary CTA goes to Calendly, secondary diagnostic keeps Tally.
              text = text.replace(f'href="{tally}" class="bg-gold text-slate-950 px-4 py-2 rounded-lg font-bold"', f'href="{calendly}" class="bg-gold text-slate-950 px-4 py-2 rounded-lg font-bold"')
              text = text.replace(f'href="{tally}" class="bg-gold text-slate-950 px-6 py-4 rounded-lg font-bold text-center"', f'href="{calendly}" class="bg-gold text-slate-950 px-6 py-4 rounded-lg font-bold text-center"')
              text = text.replace(f'href="{tally}" class="inline-flex bg-gold text-slate-950 px-7 py-4 rounded-lg font-bold"', f'href="{calendly}" class="inline-flex bg-gold text-slate-950 px-7 py-4 rounded-lg font-bold"')
              text = text.replace('data-fr="Lancer mon Agent IA avec Cyril"', f'data-fr="{cta_fr}"')
              text = text.replace('data-fr="Lancer mon Agent IA"', f'data-fr="{cta_fr}"')
              text = text.replace('>Lancer mon Agent IA avec Cyril<', f'>{cta_fr}<')
              text = text.replace('>Lancer mon Agent IA<', f'>{cta_fr}<')
              text = text.replace('data-en="Launch my AI Agent with Cyril"', f'data-en="{cta_en}"')
              text = text.replace('data-en="Launch my AI Agent"', f'data-en="{cta_en}"')
              text = text.replace('>Launch my AI Agent with Cyril<', f'>{cta_en}<')
              text = text.replace('>Launch my AI Agent<', f'>{cta_en}<')

              # Add Tally secondary CTA beside hero primary if missing.
              if tally_fr not in text:
                  text = re.sub(
                      r'(<a href="#(?:cas|usages)" class="border border-line px-6 py-4 rounded-lg font-semibold text-center"[^>]*>.*?</a>)',
                      r'\1<a href="'+tally+'" class="border border-gold/35 bg-gold/10 px-6 py-4 rounded-lg font-semibold text-center text-amber-100 hover:bg-gold/20 transition" data-fr="'+tally_fr+'" data-en="'+tally_en+'">'+tally_fr+'</a>',
                      text,
                      count=1,
                      flags=re.S,
                  )

              # Micro-proof after hero CTAs.
              if '+72 entreprises' not in text:
                  text = re.sub(r'(</div></div><aside class="card overflow-hidden soft">)', micro_proof + r'\1', text, count=1)

              # Why Cyril before other cases block.
              if 'data-fr="Pourquoi Cyril ?"' not in text:
                  marker = '<section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-6"><div><p class="text-gold font-semibold mb-2" data-fr="Autres cas concrets"'
                  block = why_block(*data['why'], *data['objection'])
                  text = text.replace(marker, block + marker, 1)

              path.write_text(text, encoding='utf-8')

          # Create trust page.
          Path('qui-est-cyril').mkdir(exist_ok=True)
          Path('qui-est-cyril/index.html').write_text(f'''<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pourquoi travailler avec Cyril ? | FikolasAI</title><meta name="description" content="Pourquoi travailler avec Cyril Cieslak pour créer votre premier Agent IA rentable : méthode, preuve, confiance, cadrage business et exécution en 7 jours."><link rel="canonical" href="https://fikolasai.com/qui-est-cyril/"><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={{theme:{{extend:{{colors:{{ink:'#050816',line:'rgba(255,255,255,.12)',gold:'#f4c76b'}}}}}}}}</script><style>body{{font-family:Inter,ui-sans-serif,system-ui;background:#050816;color:white}}.card{{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:24px}}.gold{{border-color:rgba(244,199,107,.4);background:rgba(244,199,107,.1)}}.lang-active{{background:#f4c76b;color:#07111f}}</style><script type="application/ld+json">{{"@context":"https://schema.org","@type":"Person","name":"Cyril Cieslak","url":"https://fikolasai.com/qui-est-cyril/","jobTitle":"Fondateur de FikolasAI","sameAs":["https://www.linkedin.com/in/cyrilfikolasaiacademy/"]}}</script></head><body><main class="relative overflow-hidden"><div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_0%,rgba(244,199,107,.18),transparent_32%),linear-gradient(180deg,#050816,#0b1120_50%,#050816)]"></div><nav class="border-b border-line bg-ink/88 backdrop-blur-xl"><div class="max-w-6xl mx-auto px-5 min-h-16 py-3 flex flex-wrap gap-3 items-center justify-between"><div class="flex items-center gap-3"><a href="/" class="font-semibold text-xl">FikolasAI</a><a href="/" class="inline-flex h-10 items-center rounded-lg border border-line bg-white/5 px-3 text-sm font-semibold text-slate-200 hover:bg-white/10">Accueil</a></div><div class="flex items-center gap-2"><a href="{calendly}" class="bg-gold text-slate-950 px-4 py-2 rounded-lg font-bold">Identifier mon premier Agent IA rentable</a></div></div></nav><section class="max-w-6xl mx-auto px-5 py-16 grid lg:grid-cols-[1fr_.8fr] gap-10 items-center"><div><p class="inline-flex rounded-full gold px-4 py-2 text-sm text-amber-100 mb-6">Pourquoi Cyril ?</p><h1 class="text-4xl md:text-6xl font-semibold leading-tight mb-6">Un opérateur business pour transformer une tâche répétitive en Agent IA rentable.</h1><p class="text-xl text-slate-300 leading-relaxed mb-5">Vous n’achetez pas une promesse abstraite d’IA. Vous travaillez avec Cyril pour identifier une friction réelle, construire un agent utilisable, puis vérifier qu’il entre vraiment dans votre quotidien.</p><div class="flex flex-col sm:flex-row gap-3"><a href="{calendly}" class="bg-gold text-slate-950 px-6 py-4 rounded-lg font-bold text-center">Identifier mon premier Agent IA rentable</a><a href="{tally}" class="border border-gold/35 bg-gold/10 px-6 py-4 rounded-lg font-semibold text-center text-amber-100">Remplir le diagnostic complet</a></div></div><aside class="card overflow-hidden"><img src="/assets/photo-cyril.png" alt="Cyril Cieslak, fondateur de FikolasAI" class="w-full h-[520px] object-cover object-center"><div class="p-6"><p class="text-gold font-semibold">Cyril Cieslak</p><p class="text-slate-300 mt-2">Fondateur de FikolasAI. Accompagnement direct, cadrage simple, exécution rapide.</p></div></aside></section><section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><div class="grid md:grid-cols-3 gap-4"><article class="card p-6"><h2 class="text-xl font-semibold mb-3">1. Cadrer le bon problème</h2><p class="text-slate-400">Le premier travail n’est pas technique : il consiste à choisir la tâche qui coûte vraiment du temps, de l’énergie ou de l’argent.</p></article><article class="card p-6"><h2 class="text-xl font-semibold mb-3">2. Construire vite</h2><p class="text-slate-400">L’objectif est une première version utilisable en 7 jours, pas un projet interminable ni une démonstration théorique.</p></article><article class="card p-6"><h2 class="text-xl font-semibold mb-3">3. Stabiliser l’usage</h2><p class="text-slate-400">Un Agent IA n’a de valeur que s’il est adopté. Le mois inclus sert à ajuster, simplifier et rendre l’usage naturel.</p></article></div></section><section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><div class="gold rounded-3xl p-7"><p class="text-gold font-semibold mb-3">Preuves discrètes</p><div class="grid sm:grid-cols-3 gap-3"><div><strong class="block text-3xl">+72</strong><span class="text-slate-300">entreprises identifiées</span></div><div><strong class="block text-3xl">+215</strong><span class="text-slate-300">décideurs qualifiés ajoutés</span></div><div><strong class="block text-3xl">FR + US</strong><span class="text-slate-300">agents IA déployés en France et aux États-Unis</span></div></div></div></section><section class="max-w-4xl mx-auto px-5 py-16 text-center"><h2 class="text-3xl md:text-5xl font-semibold mb-5">Vous voulez savoir quel Agent IA créer en premier ?</h2><p class="text-slate-300 mb-8">En 15 minutes, on identifie la tâche la plus rentable à supprimer ou à accélérer.</p><a href="{calendly}" class="inline-flex bg-gold text-slate-950 px-7 py-4 rounded-lg font-bold">Réserver mon Diagnostic Express IA — 15 min</a></section></main></body></html>''', encoding='utf-8')

          # Update sitemap.
          sitemap = Path('sitemap.xml').read_text(encoding='utf-8')
          if 'https://fikolasai.com/qui-est-cyril/' not in sitemap:
              entry = '''  <url>\n    <loc>https://fikolasai.com/qui-est-cyril/</loc>\n    <lastmod>2026-05-04</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>\n'''
              sitemap = sitemap.replace('</urlset>', entry + '</urlset>')
          Path('sitemap.xml').write_text(sitemap, encoding='utf-8')

          Path('.github/workflows/one-shot-conversion-seo.yml').unlink()
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add immigration-lawyers-usa/index.html sales-b2b-agent-ia/index.html agent-ia-rh/index.html agent-ia-cabinet-conseil/index.html agent-ia-dirigeant-pme/index.html agent-ia-chambre-commerce/index.html qui-est-cyril/index.html sitemap.xml .github/workflows/one-shot-conversion-seo.yml
          git commit -m "Optimize vertical landing pages for conversion and SEO"
          git push
