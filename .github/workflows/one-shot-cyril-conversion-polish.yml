name: One-shot Cyril conversion polish

on:
  push:
    paths:
      - '.github/workflows/one-shot-cyril-conversion-polish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply requested conversion polish
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          old_cal = 'https://calendly.com/cyrilfikolasai/diagnostic-express-ia-15-min'
          new_cal = 'https://calendly.com/cyril-fikolasai/rdv-cyril-fikolasai-agent'
          tally = 'https://tally.so/r/2EbyZL'
          vertical_pages = [
              'immigration-lawyers-usa/index.html',
              'sales-b2b-agent-ia/index.html',
              'agent-ia-rh/index.html',
              'agent-ia-cabinet-conseil/index.html',
              'agent-ia-dirigeant-pme/index.html',
              'agent-ia-chambre-commerce/index.html',
          ]

          def read(p): return Path(p).read_text(encoding='utf-8')
          def write(p, s): Path(p).write_text(s, encoding='utf-8')

          # Homepage: Calendly, header, price emphasis, before/after bullets, vertical cards.
          home = read('index.html')
          home = home.replace(old_cal, new_cal)
          home = home.replace('href="#case-study" class="px-3 py-2 rounded-lg hover:bg-white/10 hover:text-white transition" data-i18n="navCase">Cas avocat USA</a>', 'href="/qui-est-cyril/" class="px-3 py-2 rounded-lg hover:bg-white/10 hover:text-white transition" data-i18n="navCase">Qui est Cyril</a>')
          home = home.replace("navCase:'Cas avocat USA'", "navCase:'Qui est Cyril'")
          home = home.replace("navCase:'US lawyer case'", "navCase:'Who is Cyril'")
          home = home.replace('<span class="text-slate-300">1000€ HT</span>', '<span class="text-3xl font-semibold text-gold leading-tight">1000€ HT</span>', 1)
          home = home.replace('space-y-4 text-slate-300"><li', 'space-y-4 text-slate-300 list-disc pl-5"><li', 1)
          home = home.replace('space-y-4 text-slate-200"><li', 'space-y-4 text-slate-200 list-disc pl-5"><li', 1)

          verticals_block = '''<div id="verticals" class="mt-8 rounded-3xl border border-gold/35 bg-gold/10 p-5 md:p-6 shadow-gold"><div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-5"><div><p class="text-gold font-semibold mb-2" data-i18n="verticalsKicker">Cas concrets par métier</p><h2 class="text-2xl md:text-3xl font-semibold" data-i18n="verticalsTitle">Vous voulez voir ce que cela donne dans votre métier ?</h2><p class="text-slate-300 mt-2" data-i18n="verticalsText">Choisissez le cas qui vous ressemble et découvrez les Agents IA les plus utiles pour votre contexte.</p></div></div><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"><a href="/immigration-lawyers-usa/" class="group overflow-hidden rounded-2xl border border-line bg-slate-950/45 hover:border-gold/60 hover:bg-white/10 transition"><div class="h-28 bg-cover bg-center" style="background-image:linear-gradient(180deg,rgba(5,8,22,.10),rgba(5,8,22,.75)),url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&w=900&q=80')"></div><div class="p-4"><span class="text-xs text-amber-100" data-i18n="vertical1Tag">Juridique</span><strong class="block mt-2 group-hover:text-gold" data-i18n="vertical1Title">Avocat immigration USA</strong><p class="text-sm text-slate-400 mt-2" data-i18n="vertical1Text">Qualifier les demandes visa et structurer les dossiers.</p><span class="mt-4 inline-flex text-sm font-semibold text-gold" data-i18n="verticalCardCta">Voir le cas concret →</span></div></a><a href="/sales-b2b-agent-ia/" class="group overflow-hidden rounded-2xl border border-line bg-slate-950/45 hover:border-gold/60 hover:bg-white/10 transition"><div class="h-28 bg-cover bg-center" style="background-image:linear-gradient(180deg,rgba(5,8,22,.10),rgba(5,8,22,.75)),url('https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=900&q=80')"></div><div class="p-4"><span class="text-xs text-amber-100" data-i18n="vertical2Tag">Sales</span><strong class="block mt-2 group-hover:text-gold" data-i18n="vertical2Title">Équipe commerciale B2B</strong><p class="text-sm text-slate-400 mt-2" data-i18n="vertical2Text">Relances, qualification de leads et prospection.</p><span class="mt-4 inline-flex text-sm font-semibold text-gold" data-i18n="verticalCardCta">Voir le cas concret →</span></div></a><a href="/agent-ia-rh/" class="group overflow-hidden rounded-2xl border border-line bg-slate-950/45 hover:border-gold/60 hover:bg-white/10 transition"><div class="h-28 bg-cover bg-center" style="background-image:linear-gradient(180deg,rgba(5,8,22,.10),rgba(5,8,22,.75)),url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=900&q=80')"></div><div class="p-4"><span class="text-xs text-amber-100" data-i18n="vertical3Tag">RH</span><strong class="block mt-2 group-hover:text-gold" data-i18n="vertical3Title">RH / recrutement</strong><p class="text-sm text-slate-400 mt-2" data-i18n="vertical3Text">Synthèses candidats, entretiens et réponses.</p><span class="mt-4 inline-flex text-sm font-semibold text-gold" data-i18n="verticalCardCta">Voir le cas concret →</span></div></a><a href="/agent-ia-cabinet-conseil/" class="group overflow-hidden rounded-2xl border border-line bg-slate-950/45 hover:border-gold/60 hover:bg-white/10 transition"><div class="h-28 bg-cover bg-center" style="background-image:linear-gradient(180deg,rgba(5,8,22,.10),rgba(5,8,22,.75)),url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=900&q=80')"></div><div class="p-4"><span class="text-xs text-amber-100" data-i18n="vertical4Tag">Conseil</span><strong class="block mt-2 group-hover:text-gold" data-i18n="vertical4Title">Cabinet de conseil</strong><p class="text-sm text-slate-400 mt-2" data-i18n="vertical4Text">Audits, comptes rendus, propositions et livrables.</p><span class="mt-4 inline-flex text-sm font-semibold text-gold" data-i18n="verticalCardCta">Voir le cas concret →</span></div></a><a href="/agent-ia-dirigeant-pme/" class="group overflow-hidden rounded-2xl border border-line bg-slate-950/45 hover:border-gold/60 hover:bg-white/10 transition"><div class="h-28 bg-cover bg-center" style="background-image:linear-gradient(180deg,rgba(5,8,22,.10),rgba(5,8,22,.75)),url('https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=900&q=80')"></div><div class="p-4"><span class="text-xs text-amber-100" data-i18n="vertical5Tag">PME</span><strong class="block mt-2 group-hover:text-gold" data-i18n="vertical5Title">Dirigeant de PME</strong><p class="text-sm text-slate-400 mt-2" data-i18n="vertical5Text">Moins de charge mentale et plus de suivi.</p><span class="mt-4 inline-flex text-sm font-semibold text-gold" data-i18n="verticalCardCta">Voir le cas concret →</span></div></a><a href="/agent-ia-chambre-commerce/" class="group overflow-hidden rounded-2xl border border-line bg-slate-950/45 hover:border-gold/60 hover:bg-white/10 transition"><div class="h-28 bg-cover bg-center" style="background-image:linear-gradient(180deg,rgba(5,8,22,.10),rgba(5,8,22,.75)),url('https://images.unsplash.com/photo-1515187029135-18ee286d815b?auto=format&fit=crop&w=900&q=80')"></div><div class="p-4"><span class="text-xs text-amber-100" data-i18n="vertical6Tag">Institutionnel</span><strong class="block mt-2 group-hover:text-gold" data-i18n="vertical6Title">Chambre de commerce</strong><p class="text-sm text-slate-400 mt-2" data-i18n="vertical6Text">Demandes membres, mises en relation et événements.</p><span class="mt-4 inline-flex text-sm font-semibold text-gold" data-i18n="verticalCardCta">Voir le cas concret →</span></div></a></div></div>'''
          home = re.sub(r'<div id="verticals".*?</div>\s*<div class="mt-10 rounded-3xl', verticals_block + '<div class="mt-10 rounded-3xl', home, count=1, flags=re.S)
          home = home.replace("vertical6Text:'Demandes membres, mises en relation et événements.'", "vertical6Text:'Demandes membres, mises en relation et événements.',verticalCardCta:'Voir le cas concret →'")
          home = home.replace("vertical6Text:'Member requests, business matching and events.'", "vertical6Text:'Member requests, business matching and events.',verticalCardCta:'See the concrete case →'")
          write('index.html', home)

          proof_new = '''<div class="mt-7 grid sm:grid-cols-3 gap-3 text-sm"><div class="rounded-2xl border border-line bg-white/[0.04] p-4"><strong class="block text-gold" data-fr="Agents IA déployés" data-en="AI Agents deployed">Agents IA déployés</strong><span class="text-slate-400" data-fr="en France et aux États-Unis" data-en="in France and the United States">en France et aux États-Unis</span></div><div class="rounded-2xl border border-line bg-white/[0.04] p-4"><strong class="block text-gold" data-fr="Approche métier" data-en="Business-first approach">Approche métier</strong><span class="text-slate-400" data-fr="une tâche rentable, pas un gadget" data-en="one profitable task, not a gadget">une tâche rentable, pas un gadget</span></div><div class="rounded-2xl border border-line bg-white/[0.04] p-4"><strong class="block text-gold" data-fr="Accompagnement direct" data-en="Direct support">Accompagnement direct</strong><span class="text-slate-400" data-fr="vous travaillez avec Cyril" data-en="you work with Cyril">vous travaillez avec Cyril</span></div></div>'''
          for page in vertical_pages:
              text = read(page).replace(old_cal, new_cal)
              text = re.sub(r'<a href="/" class="inline-flex h-10 items-center rounded-lg border border-line bg-white/5 px-3 text-sm font-semibold text-slate-200 hover:bg-white/10 hover:text-white transition"><span data-fr="Accueil" data-en="Home">Accueil</span></a>', '<a href="/" aria-label="Retour à l’accueil" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-line bg-white/5 text-lg font-semibold text-slate-200 hover:bg-white/10 hover:text-white transition">←</a>', text)
              text = re.sub(r'<div class="mt-7 grid sm:grid-cols-3 gap-3 text-sm">.*?</div></div></div><aside', proof_new + '</div><aside', text, count=1, flags=re.S)
              text = text.replace('data-en="I build a simple agent that prépares', 'data-en="I build a simple agent that prepares')
              text = text.replace('data-en="Targets the right contacts and prépares', 'data-en="Targets the right contacts and prepares')
              text = text.replace('data-en="Responsibility: the agent prépares', 'data-en="Responsibility: the agent prepares')
              text = text.replace('data-en="Your judgment stays central: the agent prépares', 'data-en="Your judgment stays central: the agent prepares')
              text = text.replace('Vous ne déléguez pas a une plateforme', 'Vous ne déléguez pas à une plateforme')
              write(page, text)

          cyril_page = f'''<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Qui est Cyril ? | FikolasAI</title><meta name="description" content="Découvrez Cyril Cieslak, fondateur de FikolasAI : parcours, méthode, vision business et accompagnement pour créer votre premier Agent IA rentable."><link rel="canonical" href="https://fikolasai.com/qui-est-cyril/"><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={{theme:{{extend:{{colors:{{ink:'#050816',line:'rgba(255,255,255,.12)',gold:'#f4c76b'}}}}}}}}</script><style>body{{font-family:Inter,ui-sans-serif,system-ui;background:#050816;color:white}}.card{{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:24px}}.gold{{border-color:rgba(244,199,107,.4);background:rgba(244,199,107,.1)}}</style><script type="application/ld+json">{{"@context":"https://schema.org","@type":"Person","name":"Cyril Cieslak","url":"https://fikolasai.com/qui-est-cyril/","email":"cyril.fikolasai@gmail.com","jobTitle":"Fondateur de FikolasAI","sameAs":["https://www.linkedin.com/in/cyrilfikolasaiacademy/"]}}</script></head><body><main class="relative overflow-hidden"><div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_0%,rgba(244,199,107,.18),transparent_32%),linear-gradient(180deg,#050816,#0b1120_50%,#050816)]"></div><nav class="border-b border-line bg-ink/88 backdrop-blur-xl"><div class="max-w-6xl mx-auto px-5 min-h-16 py-3 flex flex-wrap gap-3 items-center justify-between"><div class="flex items-center gap-3"><a href="/" class="font-semibold text-xl">FikolasAI</a><a href="/" aria-label="Retour à l’accueil" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-line bg-white/5 text-lg font-semibold text-slate-200 hover:bg-white/10">←</a></div><a href="{new_cal}" class="bg-gold text-slate-950 px-4 py-2 rounded-lg font-bold">Identifier mon premier Agent IA rentable</a></div></nav><section class="max-w-6xl mx-auto px-5 py-16 grid lg:grid-cols-[1fr_.82fr] gap-10 items-center"><div><p class="inline-flex rounded-full gold px-4 py-2 text-sm text-amber-100 mb-6">Qui est Cyril ?</p><h1 class="text-4xl md:text-6xl font-semibold leading-tight mb-6">Un partenaire de terrain pour transformer une friction métier en Agent IA utile.</h1><p class="text-xl text-slate-300 leading-relaxed mb-5">Je m’appelle Cyril Cieslak. Avec FikolasAI, mon rôle n’est pas de vous vendre “de l’IA”, mais de vous aider à identifier une tâche répétitive qui coûte du temps, puis à la transformer en système simple, utilisable et rentable.</p><p class="text-xl text-slate-300 leading-relaxed mb-8">Je travaille avec des dirigeants, indépendants et équipes qui veulent avancer vite sans se perdre dans le jargon technique. On part du terrain : vos emails, vos demandes clients, vos relances, vos dossiers, vos livrables.</p><div class="flex flex-col sm:flex-row gap-3"><a href="{new_cal}" class="bg-gold text-slate-950 px-6 py-4 rounded-lg font-bold text-center">Identifier mon premier Agent IA rentable</a><a href="mailto:cyril.fikolasai@gmail.com" class="border border-gold/35 bg-gold/10 px-6 py-4 rounded-lg font-semibold text-center text-amber-100">cyril.fikolasai@gmail.com</a></div></div><aside class="card overflow-hidden"><img src="/assets/photo-cyril.png" alt="Cyril Cieslak, fondateur de FikolasAI" class="w-full h-[540px] object-cover object-center"><div class="p-6"><p class="text-gold font-semibold">Cyril Cieslak</p><p class="text-slate-300 mt-2">Fondateur de FikolasAI. Accompagnement direct, cadrage business, livraison rapide.</p></div></aside></section><section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><div class="grid md:grid-cols-3 gap-4"><article class="card p-6"><h2 class="text-xl font-semibold mb-3">1. Je pars du problème, pas de l’outil</h2><p class="text-slate-400">Un bon Agent IA commence par une friction claire : relancer, qualifier, résumer, préparer, classer ou rédiger. Si le problème n’est pas rentable, on ne le construit pas.</p></article><article class="card p-6"><h2 class="text-xl font-semibold mb-3">2. Je construis avec vous</h2><p class="text-slate-400">Vous savez exactement avec qui vous travaillez. On cadre ensemble, je construis, vous testez, puis on ajuste pour que l’agent colle à votre façon de travailler.</p></article><article class="card p-6"><h2 class="text-xl font-semibold mb-3">3. Je vise l’usage réel</h2><p class="text-slate-400">Le livrable doit servir dès maintenant. Pas une démo impressionnante oubliée deux semaines plus tard, mais un système qui retire une tâche pénible de votre quotidien.</p></article></div></section><section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><div class="grid lg:grid-cols-[.8fr_1.2fr] gap-6"><div><p class="text-gold font-semibold mb-3">Ce qui me rend utile</p><h2 class="text-3xl md:text-4xl font-semibold leading-tight">Faire le lien entre votre business et l’IA, sans théâtre technique.</h2></div><div class="gold rounded-3xl p-7"><div class="grid sm:grid-cols-3 gap-4"><div><strong class="block text-xl">France + États-Unis</strong><span class="text-slate-300 text-sm">agents IA déployés dans des contextes réels</span></div><div><strong class="block text-xl">1 cas prioritaire</strong><span class="text-slate-300 text-sm">pour éviter les projets flous et interminables</span></div><div><strong class="block text-xl">30 jours inclus</strong><span class="text-slate-300 text-sm">pour stabiliser l’usage après livraison</span></div></div></div></div></section><section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><h2 class="text-3xl md:text-4xl font-semibold mb-6">La méthode en clair</h2><div class="grid md:grid-cols-4 gap-3"><div class="card p-5"><p class="text-gold font-semibold">Audit</p><p class="text-slate-400 text-sm mt-2">On identifie la tâche répétitive qui coûte vraiment quelque chose.</p></div><div class="card p-5"><p class="text-gold font-semibold">Cadrage</p><p class="text-slate-400 text-sm mt-2">On choisit un seul premier agent, avec une sortie attendue claire.</p></div><div class="card p-5"><p class="text-gold font-semibold">Construction</p><p class="text-slate-400 text-sm mt-2">Je crée l’agent et l’adapte à vos mots, vos exemples, vos contraintes.</p></div><div class="card p-5"><p class="text-gold font-semibold">Adoption</p><p class="text-slate-400 text-sm mt-2">On ajuste pendant le mois inclus pour que l’usage devienne naturel.</p></div></div></section><section class="max-w-4xl mx-auto px-5 py-16 text-center"><h2 class="text-3xl md:text-5xl font-semibold mb-5">Vous voulez savoir quel Agent IA créer en premier ?</h2><p class="text-slate-300 mb-8">En 15 minutes, on identifie la tâche la plus rentable à supprimer ou à accélérer.</p><div class="flex flex-col sm:flex-row justify-center gap-3"><a href="{new_cal}" class="inline-flex justify-center bg-gold text-slate-950 px-7 py-4 rounded-lg font-bold">Réserver un échange avec Cyril</a><a href="{tally}" class="inline-flex justify-center border border-gold/35 bg-gold/10 px-7 py-4 rounded-lg font-semibold text-amber-100">Remplir le diagnostic complet</a></div></section></main></body></html>'''
          write('qui-est-cyril/index.html', cyril_page)

          Path('.github/workflows/one-shot-cyril-conversion-polish.yml').unlink()
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html immigration-lawyers-usa/index.html sales-b2b-agent-ia/index.html agent-ia-rh/index.html agent-ia-cabinet-conseil/index.html agent-ia-dirigeant-pme/index.html agent-ia-chambre-commerce/index.html qui-est-cyril/index.html .github/workflows/one-shot-cyril-conversion-polish.yml
          git commit -m "Polish Calendly links proof and Cyril story"
          git push
