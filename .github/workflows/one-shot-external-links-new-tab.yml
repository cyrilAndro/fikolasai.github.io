name: One Shot External Links New Tab
on:
  push:
    paths:
      - '.github/workflows/one-shot-external-links-new-tab.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open Calendly and Tally links in a new tab
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          external_hosts = (
              'https://calendly.com/cyril-fikolasai/rdv-cyril-fikolasai-agent',
              'https://tally.so/r/2EbyZL',
          )
          for p in Path('.').rglob('*.html'):
              text = p.read_text(encoding='utf-8')
              before = text
              for href in external_hosts:
                  pattern = re.compile(r'(<a\b(?=[^>]*href="' + re.escape(href) + r'")[^>]*)(>)')
                  def add_attrs(match):
                      tag = match.group(1)
                      if 'target=' not in tag:
                          tag += ' target="_blank"'
                      if 'rel=' not in tag:
                          tag += ' rel="noreferrer"'
                      return tag + match.group(2)
                  text = pattern.sub(add_attrs, text)
              if text != before:
                  p.write_text(text, encoding='utf-8')
          PY
      - name: Remove workflow and commit
        run: |
          rm .github/workflows/one-shot-external-links-new-tab.yml
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Open Calendly and Tally links in new tabs"
          git push
