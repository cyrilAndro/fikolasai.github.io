name: One-shot vertical navigation update

on:
  push:
    paths:
      - '.github/workflows/one-shot-vertical-navigation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-vertical-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Improve vertical landing navigation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          pages = [
              'immigration-lawyers-usa/index.html',
              'sales-b2b-agent-ia/index.html',
              'agent-ia-rh/index.html',
              'agent-ia-cabinet-conseil/index.html',
              'agent-ia-dirigeant-pme/index.html',
              'agent-ia-chambre-commerce/index.html',
          ]

          cases = [
              ('/immigration-lawyers-usa/', 'Avocat immigration USA', 'US immigration lawyer', 'Demandes visa, dossiers, qualification', 'Visa requests, case files, qualification'),
              ('/sales-b2b-agent-ia/', 'Commercial B2B', 'B2B sales', 'Relances, leads, prospection', 'Follow-ups, leads, prospecting'),
              ('/agent-ia-rh/', 'RH / recrutement', 'HR / recruiting', 'Candidats, entretiens, réponses', 'Candidates, interviews, replies'),
              ('/agent-ia-cabinet-conseil/', 'Cabinet de conseil', 'Consulting firm', 'Audits, livrables, comptes rendus', 'Audits, deliverables, meeting notes'),
              ('/agent-ia-dirigeant-pme/', 'Dirigeant de PME', 'SMB owner', 'Suivi, organisation, charge mentale', 'Follow-up, organization, mental load'),
              ('/agent-ia-chambre-commerce/', 'Chambre de commerce', 'Chamber of commerce', 'Membres, événements, mises en relation', 'Members, events, business matching'),
          ]

          def case_link(href, fr, en, desc_fr=None, desc_en=None, compact=False):
              if compact:
                  return f'''<a href="{href}" class="rounded-xl border border-line bg-white/[0.04] px-3 py-2 hover:bg-white/10 transition"><span class="block text-sm font-semibold text-white" data-fr="{fr}" data-en="{en}">{fr}</span></a>'''
              return f'''<a href="{href}" class="rounded-2xl border border-line bg-white/[0.04] p-4 hover:bg-white/10 transition"><span class="block font-semibold text-white" data-fr="{fr}" data-en="{en}">{fr}</span><span class="mt-2 block text-sm text-slate-400" data-fr="{desc_fr}" data-en="{desc_en}">{desc_fr}</span></a>'''

          menu_links = ''.join(case_link(*c, compact=True) for c in cases)
          cards = ''.join(case_link(*c) for c in cases)

          nav = f'''<nav class="sticky top-0 z-50 border-b border-line bg-ink/88 backdrop-blur-xl"><div class="max-w-6xl mx-auto px-5 min-h-16 py-3 flex flex-wrap gap-3 items-center justify-between"><div class="flex flex-wrap items-center gap-3"><a href="/" class="font-semibold text-xl">FikolasAI</a><a href="/" class="inline-flex h-10 items-center rounded-lg border border-line bg-white/5 px-3 text-sm font-semibold text-slate-200 hover:bg-white/10 hover:text-white transition"><span data-fr="Accueil" data-en="Home">Accueil</span></a><details class="relative group"><summary class="list-none cursor-pointer inline-flex h-10 items-center gap-2 rounded-lg border border-gold/35 bg-gold/10 px-3 text-sm font-semibold text-amber-100 hover:bg-gold/20 transition [&::-webkit-details-marker]:hidden"><span data-fr="Cas concrets" data-en="Concrete cases">Cas concrets</span><span class="text-xs">▾</span></summary><div class="absolute left-0 mt-2 w-[min(20rem,calc(100vw-2.5rem))] rounded-2xl border border-line bg-[#080d1d] p-2 shadow-2xl grid gap-2">{menu_links}</div></details></div><div class="flex items-center gap-2"><button onclick="setLang('fr')" data-lang="fr" class="lang-btn border border-line px-3 py-2 rounded-lg text-sm">FR</button><button onclick="setLang('en')" data-lang="en" class="lang-btn border border-line px-3 py-2 rounded-lg text-sm">EN</button><a href="https://tally.so/r/2EbyZL" class="bg-gold text-slate-950 px-4 py-2 rounded-lg font-bold" data-fr="Lancer mon Agent IA" data-en="Launch my AI Agent">Lancer mon Agent IA</a></div></div></nav>'''

          related = f'''<section class="max-w-6xl mx-auto px-5 py-14 border-t border-line"><div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-6"><div><p class="text-gold font-semibold mb-2" data-fr="Autres cas concrets" data-en="Other concrete cases">Autres cas concrets</p><h2 class="text-3xl md:text-4xl font-semibold" data-fr="Comparez les exemples par métier." data-en="Compare examples by industry.">Comparez les exemples par métier.</h2><p class="text-slate-400 mt-3" data-fr="Chaque page montre un contexte, des irritants et des Agents IA différents. Choisissez celui qui ressemble le plus à votre activité." data-en="Each page shows a different context, friction points and AI Agents. Choose the one closest to your business.">Chaque page montre un contexte, des irritants et des Agents IA différents. Choisissez celui qui ressemble le plus à votre activité.</p></div><a href="/" class="inline-flex rounded-lg border border-line bg-white/5 px-4 py-3 text-sm font-semibold hover:bg-white/10 transition"><span data-fr="Retour à la home" data-en="Back to homepage">Retour à la home</span></a></div><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">{cards}</div></section>'''

          for page in pages:
              path = Path(page)
              text = path.read_text(encoding='utf-8')
              text, count = re.subn(r'<nav\b.*?</nav>', nav, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'Navigation not replaced in {page}')
              if 'data-fr="Autres cas concrets"' not in text:
                  text = text.replace('<section class="max-w-4xl mx-auto px-5 py-16 text-center">', related + '<section class="max-w-4xl mx-auto px-5 py-16 text-center">', 1)
              path.write_text(text, encoding='utf-8')

          Path('.github/workflows/one-shot-vertical-navigation.yml').unlink()
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add immigration-lawyers-usa/index.html sales-b2b-agent-ia/index.html agent-ia-rh/index.html agent-ia-cabinet-conseil/index.html agent-ia-dirigeant-pme/index.html agent-ia-chambre-commerce/index.html .github/workflows/one-shot-vertical-navigation.yml
          git commit -m "Improve navigation between vertical case pages"
          git push
