name: One Shot Visible CTA Copy Cleanup
on:
  push:
    paths:
      - '.github/workflows/one-shot-visible-cta-copy.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean visible CTA copy and hrefs
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          calendly = 'https://calendly.com/cyril-fikolasai/rdv-cyril-fikolasai-agent'
          for key in ['navCta','primaryCta','finalCta','stickyCta']:
              pattern = rf'(<a [^>]*data-i18n="{key}"[^>]*>)(.*?)(</a>)'
              text = re.sub(pattern, rf'\1Identifier mon premier Agent IA rentable\3', text, flags=re.S)
              pattern_href = rf'(<a href=")[^"]*("[^>]*data-i18n="{key}")'
              text = re.sub(pattern_href, rf'\1{calendly}\2', text)
          if "secondaryCta:'Voir les cas par métier',diagnosticCta:'Remplir le diagnostic complet'" not in text:
              text = text.replace("secondaryCta:'Voir les cas par métier'", "secondaryCta:'Voir les cas par métier',diagnosticCta:'Remplir le diagnostic complet'")
          p.write_text(text, encoding='utf-8')
          PY
      - name: Remove workflow and commit
        run: |
          rm .github/workflows/one-shot-visible-cta-copy.yml
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Clean visible CTA copy"
          git push
