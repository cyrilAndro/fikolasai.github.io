name: Update Cyril labels and copy

on:
  push:
    paths:
      - '.github/workflows/update-cyril-copy.yml'

permissions:
  contents: write

jobs:
  update-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update labels and paragraphs
        run: |
          python3 <<'PY'
          from pathlib import Path

          home = Path('index.html')
          text = home.read_text(encoding='utf-8')
          text = text.replace('>Qui est Cyril</a>', '>Qui est Cyril ?</a>')
          text = text.replace("navCase:'Qui est Cyril'", "navCase:'Qui est Cyril ?'")
          text = text.replace("navCase:'Who is Cyril'", "navCase:'Who is Cyril?'")
          home.write_text(text, encoding='utf-8')

          page = Path('qui-est-cyril/index.html')
          text = page.read_text(encoding='utf-8')
          text = text.replace('Qui est Cyril Cieslak ?', 'Qui est Cyril ?')
          text = text.replace(
              '<p class="text-xl text-slate-300 leading-relaxed mb-5">Je m’appelle Cyril Cieslak. Avec FikolasAI, mon rôle n’est pas de vous vendre “de l’IA”, mais de vous aider à identifier une tâche répétitive qui coûte du temps, puis à la transformer en système simple, utilisable et rentable.</p>',
              '<p class="text-xl text-slate-300 leading-relaxed mb-4">Je m’appelle Cyril Cieslak.</p>\n        <p class="text-xl text-slate-300 leading-relaxed mb-5">Avec FikolasAI, mon rôle n’est pas de vous vendre “de l’IA”. Je vous aide à identifier une tâche répétitive qui coûte du temps, puis à la transformer en système simple, utilisable et rentable.</p>'
          )
          text = text.replace(
              '<p class="text-xl text-slate-300 leading-relaxed mb-5">Je travaille avec des dirigeants, indépendants, cabinets, réseaux professionnels et équipes qui veulent avancer vite sans se perdre dans le jargon technique. On part du terrain : vos emails, vos demandes clients, vos relances, vos dossiers, vos livrables.</p>',
              '<p class="text-xl text-slate-300 leading-relaxed mb-4">Je travaille avec des dirigeants, indépendants, cabinets, réseaux professionnels et équipes qui veulent avancer vite sans se perdre dans le jargon technique.</p>\n        <p class="text-xl text-slate-300 leading-relaxed mb-5">On part du terrain : vos emails, vos demandes clients, vos relances, vos dossiers, vos livrables.</p>'
          )
          text = text.replace(
              '<p class="text-lg text-slate-400 leading-relaxed mb-8">Mon point de départ est volontairement concret : une tâche, un résultat attendu, un agent utilisable. Le reste vient ensuite seulement si cela crée de la valeur.</p>',
              '<p class="text-lg text-slate-400 leading-relaxed mb-4">Mon point de départ est volontairement concret : une tâche, un résultat attendu, un agent utilisable.</p>\n        <p class="text-lg text-slate-400 leading-relaxed mb-8">Le reste vient ensuite seulement si cela crée de la valeur.</p>'
          )
          page.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html qui-est-cyril/index.html
          git commit -m "Clarify Cyril label and improve copy spacing" || exit 0
          git push
