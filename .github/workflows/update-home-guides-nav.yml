name: Update home guides navigation

on:
  push:
    paths:
      - '.github/workflows/update-home-guides-nav.yml'

permissions:
  contents: write

jobs:
  update-home-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add Guides IA to homepage navigation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              '<a href="/ressources-ia/" class="px-3 py-2 rounded-lg hover:bg-white/10 hover:text-white transition" data-i18n="navResources">Ressources IA</a><a href="/qui-est-cyril/" class="px-3 py-2 rounded-lg hover:bg-white/10 hover:text-white transition" data-i18n="navCase">Qui est Cyril ?</a>',
              '<a href="/ressources-ia/" class="px-3 py-2 rounded-lg hover:bg-white/10 hover:text-white transition" data-i18n="navResources">Ressources IA</a><a href="/guides-ia/" class="px-3 py-2 rounded-lg hover:bg-white/10 hover:text-white transition" data-i18n="navGuides">Guides IA</a><a href="/qui-est-cyril/" class="px-3 py-2 rounded-lg hover:bg-white/10 hover:text-white transition" data-i18n="navCase">Qui est Cyril ?</a>',
              1
          )
          text = text.replace(
              '<a href="/ressources-ia/" class="rounded-xl border border-line bg-white/[0.04] px-3 py-3 text-sm font-semibold hover:bg-white/10" data-i18n="navResources">Ressources IA</a><a href="/qui-est-cyril/" class="rounded-xl border border-line bg-white/[0.04] px-3 py-3 text-sm font-semibold hover:bg-white/10" data-i18n="navCase">Qui est Cyril ?</a>',
              '<a href="/ressources-ia/" class="rounded-xl border border-line bg-white/[0.04] px-3 py-3 text-sm font-semibold hover:bg-white/10" data-i18n="navResources">Ressources IA</a><a href="/guides-ia/" class="rounded-xl border border-line bg-white/[0.04] px-3 py-3 text-sm font-semibold hover:bg-white/10" data-i18n="navGuides">Guides IA</a><a href="/qui-est-cyril/" class="rounded-xl border border-line bg-white/[0.04] px-3 py-3 text-sm font-semibold hover:bg-white/10" data-i18n="navCase">Qui est Cyril ?</a>',
              1
          )

          if "navGuides:'Guides IA'" not in text:
              text = text.replace("navResources:'Ressources IA',navMenu:'Menu'", "navResources:'Ressources IA',navGuides:'Guides IA',navMenu:'Menu'")
          if "navGuides:'AI guides'" not in text:
              text = text.replace("navResources:'AI resources',navMenu:'Menu'", "navResources:'AI resources',navGuides:'AI guides',navMenu:'Menu'")

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit update
        run: |
          if git diff --quiet index.html; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add Guides IA to homepage header"
          git push
